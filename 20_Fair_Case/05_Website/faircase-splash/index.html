<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fair Case — Get a free case evaluation. No upfront cost.</title>
  <meta name="description" content="Accident victims may qualify for compensation. Get a free case evaluation in ten minutes. No upfront cost — attorneys work on contingency.">

  <!-- noindex until traffic is intentional — remove before launch -->
  <meta name="robots" content="noindex, nofollow">

  <link rel="canonical" href="https://getafaircase.com/">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/fair-case-favicon.svg">
  <link rel="apple-touch-icon" href="images/fair-case-favicon.svg">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://getafaircase.com/">
  <meta property="og:title" content="Fair Case — Get a free case evaluation. No upfront cost.">
  <meta property="og:description" content="Accident victims may qualify for compensation. Get a free case evaluation in ten minutes. No upfront cost — attorneys work on contingency.">
  <meta property="og:image" content="https://getafaircase.com/images/og-faircase.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Fair Case — Free case evaluation for accident victims">
  <meta property="og:site_name" content="Fair Case">
  <meta property="og:locale" content="en_US">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://getafaircase.com/">
  <meta name="twitter:title" content="Fair Case — Get a free case evaluation. No upfront cost.">
  <meta name="twitter:description" content="Accident victims may qualify for compensation. Get a free case evaluation in ten minutes. No upfront cost — attorneys work on contingency.">
  <meta name="twitter:image" content="https://getafaircase.com/images/og-faircase.jpg">
  <meta name="twitter:image:alt" content="Fair Case — Free case evaluation for accident victims">

  <!-- Inter — functional voice (Google Fonts, free) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">

  <style>
    /* ── Splash-specific overrides ──────────────────────────────
       Keeps the full-height centered layout. The hero fills
       all remaining space after the nav — same technique as
       the Second Chair splash. No other page sections needed.
    ──────────────────────────────────────────────────────────── */
  </style>
</head>
<body>

<!-- NAV ─────────────────────────────────────────────────────── -->
<nav id="nav" role="navigation" aria-label="Main navigation">
  <div class="container">

    <!-- Logo: full wordmark on desktop, mark only on mobile (CSS swap) -->
    <a href="/" class="nav-logo-wrap" aria-label="Fair Case — home">
      <!-- Full logo + wordmark (997×437 viewBox) -->
      <img
        src="images/fair-case-logo-full.svg"
        alt="Fair Case"
        class="logo-full"
        width="82"
        height="36"
      >
      <!-- Mark only (431×437 viewBox) — shown on mobile via CSS -->
      <img
        src="images/fair-case-logo-mark.svg"
        alt="Fair Case"
        class="logo-mark"
        width="36"
        height="36"
      >
    </a>


  </div>
</nav>

<!-- HERO ─────────────────────────────────────────────────────── -->
<section id="hero" aria-label="Hero">
  <div class="container">
    <div class="hero-inner">

      <!-- Pill badge -->
      <div class="hero-pill" role="note">
        Free &middot; No upfront cost
        <span class="hero-pill-arrow" aria-hidden="true">→</span>
      </div>

      <!-- H1 — three parallel possessives. Each line is a complete thought.
           Upright (not italic): Fair Case speaks directly, not editorially.
           "Your rights." → what's at stake.
           "Your case."   → what you own.
           "Your call."   → what to do next (triple meaning: your decision,
                            your phone call, your right to act). -->
      <h1 class="hero-headline">
        Your rights.<br>
        Your case.<br>
        Your call.
      </h1>

      <!-- Sub-line — the brand promise, verbatim from brand brief.
           Plain, direct, no manufactured urgency, no guarantee. -->
      <p class="hero-sub">
        You deserve to know what your case is worth.
      </p>

      <!-- Coming soon badge — replaces the CTA until the quiz is live.
           Not a link, not clickable. Swap for the real CTA button when
           getafaircase.com/quiz is ready. -->
      <div class="hero-coming-soon" aria-label="Coming soon">
        Coming soon
      </div>

    </div>
  </div>
</section>

</body>
</html>
